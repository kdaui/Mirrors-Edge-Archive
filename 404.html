<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .error-image {
            max-width: 300px;
            width: 100%;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: var(--color-runner-red);
            margin-bottom: 0.5rem;
        }
        .error-message {
            font-size: 1.2rem;
            color: var(--color-city-gray);
            margin-bottom: 2rem;
        }
        .back-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--color-runner-red);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .back-link:hover {
            background: var(--color-catalyst-blue);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="images/rei.png" alt="REI" class="error-image">
        <div class="error-code">404</div>
        <p class="error-message">This page doesn't exist. Just like how none of us exist.</p>
        <a href="index.html" class="back-link">Go Home</a>
    </div>
</body>
</html>
